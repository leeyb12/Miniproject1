<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chatbot</title>
    <style>
      .chat-container {
        background-color: rgb(211, 185, 236);
        width: 1000px;
        height: 1000px;
        margin: auto;
        padding: 1rem 3rem 0 3rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        transform: translateY(100%);
        overflow-y: auto;
      }
      .message {
        display: flex;
        align-items: flex-end;
        margin-bottom: 1.2rem;
      }
      .message.bot {
        justify-content: flex-start;
      }
      .message.user {
        justify-content: flex-end;
      }

      .name {
        font-size: 0.8rem;
        color: #555;
        margin: 0 10px 2px;
      }

      .bubble {
        max-width: 300px;
        position: relative;
        background-color: rgb(212, 212, 211);
        padding: 0.7rem 2rem;
        border-radius: 20px;
        word-break: break-word;
      }
      .user .bubble {
        background-color: rgb(255, 255, 122);
      }
      .user .name {
        text-align: right;
      }

      .chat-container::-webkit-scrollbar {
        background-color: rgb(253, 250, 255);
        border-radius: 0 20px 20px 0;
        width: 30px;
      }
      .chat-container::-webkit-scrollbar-thumb {
        background-color: rgb(253, 250, 255);
        border-radius: 0 20px 20px 0;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>채팅봇</h1>
    <hr />
    <a href="index.html">홈으로</a><br />
    <!-- div.chat-container>div.message.bot>div>div.name{myBot}+div.bobble{안녕하세요. 무엇을 도와드릴까요?}^^div.message.user>div>div.name{나}+div.bubble -->

    <div class="box">
      <div class="chat-container"></div>
    </div>
  </body>
</html>
